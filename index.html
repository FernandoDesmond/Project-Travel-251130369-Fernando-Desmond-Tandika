<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Travelinds</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-image: url("head.jpg");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 350px;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            color: #1f4e79;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #1f4e79;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2c5d9e;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <h1>Travelinds</h1>

        <p>Silakan login untuk masuk</p>

        <input type="text" id="username" placeholder="Username">

        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Masuk</button>

    </div>

    <script>

        function login() {

            let username =
                document.getElementById("username").value;

            let password =
                document.getElementById("password").value;

            if (username.trim() !== "" &&
                password.trim() !== "") {

                localStorage.setItem("login", "true");

                window.location.href = "utama.html";

            } else {

                alert("Username dan Password harus diisi!");

            }
        }

    </script>

</body>

</html>
